name: Build and Release Extension Charts

on:
  workflow_dispatch:
  release:
    types: [released]

defaults:
  run:
    shell: bash
    working-directory: ./

jobs:
  build-extension-charts:
    uses: rancher/dashboard/.github/workflows/build-extension-charts.yml@9bf23dff6650116673346447bcf0b088e0edb27f # creators-pkg-3.0.12
    permissions:
      contents: write
      pull-requests: write
    with:
      target_branch: gh-pages
      tagged_release: ${{ github.ref_name }}
